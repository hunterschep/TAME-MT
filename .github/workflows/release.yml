name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI after building and validating artifacts"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_TEST_COMMAND: "python {project}/scripts/wheel_smoke.py"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  release-check:
    name: Validate release artifacts
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check distributions
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - name: Prepare SBOM output directory
        run: mkdir -p sbom
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom/tame-mt.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-sbom
          path: sbom/tame-mt.spdx.json

  publish:
    name: Publish to PyPI
    needs: release-check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      (github.event_name == 'push' || github.event.inputs.publish == 'true')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - name: Publish package distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
