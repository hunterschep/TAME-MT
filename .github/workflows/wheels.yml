name: Wheels

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "src/**"
      - ".github/workflows/wheels.yml"

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_TEST_COMMAND: >-
            tame-mt doctor &&
            tame-mt score
            --train-src {project}/tests/fixtures/train.src
            --train-tgt {project}/tests/fixtures/train.tgt
            --test-src {project}/tests/fixtures/test.src
            --ref {project}/tests/fixtures/test.ref
            --hyp {project}/tests/fixtures/hyp.out
            --quiet &&
            tame-mt index build
            --train-src {project}/tests/fixtures/train.src
            --train-tgt {project}/tests/fixtures/train.tgt
            --out tame_fixture.tameidx
            --quiet &&
            tame-mt score
            --index tame_fixture.tameidx
            --test-src {project}/tests/fixtures/test.src
            --ref {project}/tests/fixtures/test.ref
            --hyp {project}/tests/fixtures/hyp.out
            --quiet
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
