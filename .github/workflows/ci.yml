name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Rust format
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy -- -D warnings
      - name: Rust tests
        run: cargo test
      - name: Ruff format
        run: ruff format --check .
      - name: Ruff
        run: ruff check .
      - name: Test
        run: pytest
      - name: Smoke benchmark
        run: python benchmarks/bench_synthetic.py --small --assert-thresholds
      - name: Staged smoke benchmark
        run: python benchmarks/bench_synthetic.py --small --staged --assert-thresholds
      - name: Fast retrieval recall validation
        run: python benchmarks/validate_fast_recall.py --require-native
      - name: Type check
        run: mypy src/tame_mt

  performance:
    name: Performance regression smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Larger staged benchmark
        run: |
          python benchmarks/bench_synthetic.py \
            --train-size 50000 \
            --test-size 1000 \
            --staged \
            --max-seconds 20 \
            --max-index-build-seconds 20 \
            --max-indexed-seconds 8 \
            --max-cached-seconds 5 \
            --max-prepared-cached-seconds 2 \
            --max-cached-batch-per-system-seconds 2 \
            --max-index-bytes 80000000 \
            --assert-thresholds
      - name: Broader fast retrieval recall validation
        run: python benchmarks/validate_fast_recall.py --require-native --train-size 5000 --test-size 500

  dependency-compatibility:
    name: SacreBLEU compatibility (${{ matrix.sacrebleu }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sacrebleu:
          - "sacrebleu>=2.4,<2.5"
          - "sacrebleu>=2.6,<3"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install package and selected SacreBLEU range
        run: |
          python -m pip install -e '.[dev]'
          python -m pip install '${{ matrix.sacrebleu }}'
      - name: Verify selected SacreBLEU version
        run: |
          python - <<'PY'
          import sacrebleu
          version = tuple(int(part) for part in sacrebleu.__version__.split(".")[:2])
          if version[0] != 2:
              raise SystemExit(f"unsupported SacreBLEU major version: {sacrebleu.__version__}")
          print(sacrebleu.__version__)
          PY
      - name: Compatibility tests
        run: pytest tests/test_scoring.py tests/test_report.py tests/test_cli.py::test_cli_doctor_reports_environment

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Python dependency audit
        run: |
          python -m pip install pip-audit
          python -m pip_audit . --progress-spinner off
      - name: Rust dependency audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/tame-wheel-smoke
          /tmp/tame-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/tame-wheel-smoke/bin/python scripts/wheel_smoke.py
