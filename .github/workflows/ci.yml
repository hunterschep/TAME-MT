name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  static:
    name: Static analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check
      - name: Ruff format
        run: ruff format --check .
      - name: Ruff
        run: ruff check .
      - name: Type check
        run: mypy src/tame_mt
      - name: Version consistency
        run: python scripts/check_versions.py

  rust:
    name: Rust checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Rust format
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test --locked

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check
      - name: Native extension smoke
        run: tame-mt doctor
      - name: Test
        run: pytest
      - name: Smoke benchmark
        run: python benchmarks/bench_synthetic.py --small --assert-thresholds
      - name: Staged smoke benchmark
        run: python benchmarks/bench_synthetic.py --small --staged --assert-thresholds
      - name: Fast retrieval recall validation
        run: python benchmarks/validate_fast_recall.py --require-native

  performance:
    name: Performance regression smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check
      - name: Larger staged benchmark
        run: |
          python benchmarks/bench_synthetic.py \
            --train-size 50000 \
            --test-size 1000 \
            --staged \
            --max-seconds 20 \
            --max-index-build-seconds 20 \
            --max-indexed-seconds 8 \
            --max-cached-seconds 5 \
            --max-prepared-cached-seconds 2 \
            --max-cached-batch-per-system-seconds 2 \
            --max-index-bytes 80000000 \
            --assert-thresholds
      - name: Larger approximate throughput benchmark
        run: |
          python benchmarks/bench_synthetic.py \
            --train-size 50000 \
            --test-size 1000 \
            --retrieval approx \
            --allow-approximate \
            --index-mode native_fast \
            --staged \
            --max-seconds 10 \
            --max-index-build-seconds 12 \
            --max-indexed-seconds 4 \
            --max-cached-seconds 3 \
            --max-prepared-cached-seconds 1 \
            --max-cached-batch-per-system-seconds 1 \
            --max-index-bytes 80000000 \
            --assert-thresholds
      - name: Broader fast retrieval recall validation
        run: python benchmarks/validate_fast_recall.py --require-native --train-size 5000 --test-size 500

  dependency-compatibility:
    name: SacreBLEU compatibility (${{ matrix.sacrebleu }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        sacrebleu:
          - "sacrebleu>=2.4,<2.5"
          - "sacrebleu>=2.6,<3"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and selected SacreBLEU range
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install '${{ matrix.sacrebleu }}'
          python -m pip check
      - name: Verify selected SacreBLEU version
        run: |
          python - <<'PY'
          import sacrebleu
          version = tuple(int(part) for part in sacrebleu.__version__.split(".")[:2])
          if version[0] != 2:
              raise SystemExit(f"unsupported SacreBLEU major version: {sacrebleu.__version__}")
          print(sacrebleu.__version__)
          PY
      - name: Compatibility tests
        run: pytest tests/test_scoring.py tests/test_report.py tests/test_cli.py::test_cli_doctor_reports_environment

  security:
    name: Dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'pip-audit>=2.7'
          python -m pip_audit . --progress-spinner off
      - name: Rust dependency audit
        run: |
          cargo install cargo-audit --locked --version 0.22.2
          cargo audit --deny warnings

  package:
    name: Build package
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip check
      - name: Build
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/tame-wheel-smoke
          /tmp/tame-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/tame-wheel-smoke/bin/python -m pip check
          /tmp/tame-wheel-smoke/bin/python scripts/wheel_smoke.py
          /tmp/tame-wheel-smoke/bin/tame-mt doctor
